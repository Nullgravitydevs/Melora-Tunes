<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03" clip-path="url(#roundedSquare)">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Outer glow circle -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.15"/>
  
  <!-- Main vinyl disc -->
  <g transform="translate(256, 240)">
    <!-- Disc body -->
    <circle cx="0" cy="0" r="120" fill="#111" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    
    <!-- Grooves -->
    <circle cx="0" cy="0" r="105" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="85" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="75" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="65" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    
    <!-- Label circle -->
    <circle cx="0" cy="0" r="45" fill="url(#accent)"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    
    <!-- Center hole -->
    <circle cx="0" cy="0" r="8" fill="#1a1a2e"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
    
    <!-- Shine reflection -->
    <ellipse cx="-35" cy="-35" rx="60" ry="30" fill="rgba(255,255,255,0.03)" transform="rotate(-45)"/>
  </g>

  <!-- Sound waves emanating from disc -->
  <g filter="url(#glow)" transform="translate(256, 240)">
    <!-- Wave 1 -->
    <path d="M 135 -30 Q 160 -50 160 0 Q 160 50 135 30" fill="none" stroke="url(#wave1)" stroke-width="3" stroke-linecap="round"/>
    <!-- Wave 2 -->
    <path d="M 155 -45 Q 185 -65 185 0 Q 185 65 155 45" fill="none" stroke="url(#wave2)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Wave 3 -->
    <path d="M 175 -55 Q 210 -80 210 0 Q 210 80 175 55" fill="none" stroke="url(#wave2)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Tonearm -->
  <g transform="translate(256, 240)">
    <line x1="80" y1="-100" x2="115" y2="-40" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="80" cy="-100" r="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <circle cx="115" cy="-40" r="4" fill="url(#accent)" opacity="0.8"/>
  </g>

  <!-- "M" Letter watermark in the label -->
  <text x="256" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="36" fill="rgba(255,255,255,0.9)" letter-spacing="-1">M</text>

  <!-- App Name -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="42" fill="white" letter-spacing="6" opacity="0.95">MELORA</text>
  <text x="256" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="8">PREMIUM AUDIO</text>
</svg>
